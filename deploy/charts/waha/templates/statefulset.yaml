apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: waha # The name of the StatefulSet
  namespace: waha
spec:
  serviceName: "waha-service"
  replicas: 1 # only one is needed
  selector:
    matchLabels:
      app: waha
  template:
    metadata:
      labels:
        app: waha
    spec:
      containers:
      - name: {{ .Values.image.name }}
        image: {{ .Values.image.repository }}/{{ .Values.image.name }}:{{ .Values.image.tag }}
        ports:
        - containerPort: 3000
          name: web
        volumeMounts:
        - name: sessions
          mountPath: /app/.sessions # Mount path in the container
        envFrom:
        - secretRef:
            name: waha-secrets
  volumeClaimTemplates:
  - metadata:
      name: sessions
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
