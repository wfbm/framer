apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/wfbm/framer.git
    path: deploy/charts/cloudflare-tunnel
    targetRevision: HEAD
    helm:
      values: |-
        tunnel:
          credentials: ""
          secretName: "tunnel-credentials"
  destination:
    server: https://kubernetes.default.svc
    namespace: networking
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

