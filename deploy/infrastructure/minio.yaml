apiVersion: v1
kind: Namespace
metadata:
  name: storage
  labels:
    name: storage
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: minio-credentials
  namespace: storage
spec:
  encryptedData:
    MINIO_ROOT_PASSWORD: 
    MINIO_ROOT_USER: 
  template:
    metadata:
      name: minio-credentials
      namespace: storage
    type: Opaque
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: minio
    targetRevision: 17.0.21
    helm:
      values: |
        image:
          registry: quay.io/minio
          repository: minio
          tag: latest
          pullPolicy: IfNotPresent
        command: 
          - /usr/bin/minio
          - server
          - /bitnami/minio/data
        auth:
          existingSecret: minio-credentials
          forcePassword: true
        extraEnvVarsSecret: minio-credentials
        persistence: 
          enabled: true
          size: 5Gi
        service:
          type: ClusterIP
          ports:
            s3: 9000
        global:
          imagePullSecrets: []
          security:
            allowInsecureImages: true
        console:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
